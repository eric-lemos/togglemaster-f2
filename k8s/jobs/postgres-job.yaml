apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-schema-sql
  namespace: togglemaster
data:
  auth-reset.sql: |
    DROP TABLE IF EXISTS api_keys CASCADE;
  flag-reset.sql: |
    DROP TRIGGER IF EXISTS set_timestamp ON flags;
    DROP TABLE IF EXISTS flags CASCADE;
    DROP FUNCTION IF EXISTS trigger_set_timestamp();
  targeting-reset.sql: |
    DROP TRIGGER IF EXISTS set_timestamp ON targeting_rules;
    DROP TABLE IF EXISTS targeting_rules CASCADE;
    DROP FUNCTION IF EXISTS trigger_set_timestamp();
  auth.sql: |
    CREATE TABLE IF NOT EXISTS api_keys (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        
        -- key_hash armazena o hash SHA-256 da chave, que tem 64 caracteres hexadecimais
        key_hash VARCHAR(64) NOT NULL UNIQUE, 
        
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
  flag.sql: |
    CREATE TABLE IF NOT EXISTS flags (
        id SERIAL PRIMARY KEY,

        -- 'name' e a chave de negocio unica (ex: 'enable-new-checkout')
        name VARCHAR(100) UNIQUE NOT NULL,

        description TEXT,

        -- Este e o 'kill switch' global. Se for false, a flag esta desativada para todos.
        is_enabled BOOLEAN NOT NULL DEFAULT false,

        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Opcional, mas boa pratica: Trigger para atualizar 'updated_at' automaticamente
    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    -- Remove o trigger se ja existir, para evitar erro na recriacao
    DROP TRIGGER IF EXISTS set_timestamp ON flags;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON flags
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();
  targeting.sql: |
    CREATE TABLE IF NOT EXISTS targeting_rules (
        id SERIAL PRIMARY KEY,

        -- 'flag_name' e a chave de negocio unica.
        -- Cada flag pode ter no maximo UMA regra de segmentacao.
        flag_name VARCHAR(100) UNIQUE NOT NULL,

        -- Se a regra de segmentacao em si esta ativa ou nao
        is_enabled BOOLEAN NOT NULL DEFAULT true,

        -- Armazena a logica da regra como um JSON.
        -- Ex: {"type": "PERCENTAGE", "value": 50}
        -- Ex: {"type": "USER_LIST", "values": ["u1", "u2"]}
        rules JSONB NOT NULL,

        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Trigger para atualizar 'updated_at' automaticamente (igual ao do flag-service)
    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON targeting_rules;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON targeting_rules
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-schema-init
  namespace: togglemaster
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: psql
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PGSSLMODE
              value: require
            - name: AUTH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: togglemaster-secrets
                  key: AUTH_DATABASE_URL
            - name: FLAG_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: togglemaster-secrets
                  key: FLAG_DATABASE_URL
            - name: TARGETING_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: togglemaster-secrets
                  key: TARGETING_DATABASE_URL
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              NC="\e[0m"
              BLUE="\e[0;36m"

              echo -e "${BLUE}Resetando schema do auth-service...${NC}"
              psql "$AUTH_DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/auth-reset.sql

              echo -e "${BLUE}Resetando schema do flag-service...${NC}"
              psql "$FLAG_DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/flag-reset.sql

              echo -e "${BLUE}Resetando schema do targeting-service...${NC}"
              psql "$TARGETING_DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/targeting-reset.sql

              echo -e "${BLUE}Aplicando schema do auth-service...${NC}"
              psql "$AUTH_DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/auth.sql

              echo -e "${BLUE}Aplicando schema do flag-service...${NC}"
              psql "$FLAG_DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/flag.sql

              echo -e "${BLUE}Aplicando schema do targeting-service...${NC}"
              psql "$TARGETING_DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/targeting.sql

              echo -e "${BLUE}Schemas aplicados com sucesso.${NC}"
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: postgres-schema-sql
